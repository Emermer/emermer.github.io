<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Logan Bashore</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ffffff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: clamp(10px, 2vw, 20px) 0 clamp(50px, 6vw, 70px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .main-content.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        .main-content-text {
            font-size: clamp(1rem, 2.5vw, 2.5rem);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .main-content-text.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        .main-content-text h1 {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: clamp(80px, 10vw, 150px);
            font-size: clamp(2rem, 2.5vw, 2.25rem);
        }

        .nav-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #101010;
            border-radius: 20px;
            padding: clamp(14px, 2vw, 20px) 0 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(18px, 2.5vw, 65px);
            max-width: clamp(260px, 30vw, 350px);
            width: 100%;
            overflow: hidden;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 1.8vw, 20px);
            align-items: center;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: clamp(1.05rem, 1.3vw, 1.4rem);
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: #B0BEC5;
        }

        .nav-image {
            width: 100%;
            height: clamp(4.5em, 6vw, 6em);
            border-radius: 0 0 18px 18px;
            object-fit: cover;
            margin-top: clamp(125px, 10vw, 175px);
            display: block;
            pointer-events: none;
        }

        .social-links a {
            color: #e0e0e0;
            margin: 0 10px;
            font-size: 1.2em;
        }

        .email a {
            color: #e0e0e0;
            text-decoration: none;
        }

        @media (max-width: 1080px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background-color: #121212;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                padding: 20px;
            }

            .main-content {
                margin: 42px 0px 48px;
            }

            .main-content-text h1 {
                margin-top: 3.8em;
                font-size: 2em;
            }

            .nav-box {
                max-width: clamp(240px, 75%, 320px);
                gap: clamp(50px, 6vw, 85px);
            }

            .nav-menu a {
                font-size: clamp(1.1rem, 2.5vw, 1.2rem);
            }

            .nav-image {
                margin-top: clamp(135px, 8vw, 150px);
                height: clamp(4em, 5vw, 5em);
            }
        }
    </style>
</head>
    <header>
        <a href="/" class="logo">Logan Bashore</a>

        <div id="nav-placeholder"></div>

        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <body>
        <div class="main-content-text">
            <h1>Store & Services</h1>
        </div>
        <div class="main-content">
            <div class="nav-box">
                <div class="nav-menu">
                    <a href="commissions">Commissions</a>
                    <a>Solos *COMING SOON*</a>
                    <a>Ensembles *COMING SOON*</a>
                </div>
                <img src="../media/percussionsheets.jpg" class="nav-image">
            </div>
        </div>

    <div id="footer-placeholder"></div>

    <script>
        window.addEventListener('load', () => {
            const mainText = document.querySelector('.main-content-text');
            mainText.classList.add('fade-in');
        
            const mainContent = document.querySelector('.main-content');
            const navImage = document.querySelector('.nav-image');
        
            if (navImage.complete) {
                setTimeout(() => mainContent.classList.add('fade-in'), 100);
            } else {
                navImage.addEventListener('load', () => {
                    setTimeout(() => mainContent.classList.add('fade-in'), 100);
                });
            }
        });
    </script>

    <script src="../js/site.js"></script>

    </body>
</html>
